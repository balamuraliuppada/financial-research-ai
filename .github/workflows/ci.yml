name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    name: Backend Tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short --junitxml=results/backend-junit.xml
        env:
          DATABASE_URL: "sqlite:///./test.db"

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: results/backend-junit.xml

  frontend-test:
    name: Frontend Tests (Node 18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build frontend
        run: |
          cd frontend
          npm run build --if-present
        env:
          CI: true
